# Nome da Action
name: Generate Snake

on:
  schedule:
    # Atualiza a cada 12 horas (suficiente, já que contribuições mudam no máximo diariamente)
    - cron: "0 */12 * * *"
  # Permite executar manualmente pela aba Actions
  workflow_dispatch:
  # Executa também a cada push na branch principal (mantém o agendamento ativo)
  push:
    branches:
      - main

# Necessário para que o GITHUB_TOKEN possa fazer push na branch output
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Gera os SVGs da cobrinha (versão clara e escura)
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Hicaro-Bauer
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Publica os arquivos gerados na branch output
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
